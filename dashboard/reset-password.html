<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>sAIfety — Reset Password</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --muted: #64748b;
        --accent: #6366f1;
        --red: #ef4444;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 40px 36px;
        width: 360px;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 6px;
      }
      .logo span {
        color: var(--accent);
      }
      .subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 28px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      input[type="password"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="password"]:focus {
        border-color: var(--accent);
      }

      button {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
      }

      .alert.show {
        display: block;
      }
      .alert.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }
      .footer {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      }
      .footer a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="logo">s<span>AI</span>fety</div>
      <div class="subtitle" id="subtitle">Choose a new password</div>

      <div class="alert error" id="err"></div>

      <form id="form" novalidate>
        <input type="hidden" id="token" name="token" />
        <label for="password"
          >New Password
          <span
            style="font-weight: 400; text-transform: none; letter-spacing: 0"
            >(8+ characters)</span
          ></label
        >
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Choose a strong password"
          autofocus
          autocomplete="new-password"
        />
        <button type="submit" id="btn">Set new password</button>
      </form>

      <hr />
      <div class="footer"><a href="/login">Back to sign in</a></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const errEl = document.getElementById("err");

      document.getElementById("token").value = token;

      if (!token) {
        errEl.textContent =
          "Invalid or missing reset link. Please request a new one.";
        errEl.classList.add("show");
        document.getElementById("form").style.display = "none";
      }

      const ERROR_MSGS = {
        invalid: "Password must be at least 8 characters.",
        expired:
          'This reset link has expired or already been used. <a href="/forgot-password" style="color:inherit">Request a new one.</a>',
      };

      const errKey = params.get("error");
      if (errKey && ERROR_MSGS[errKey]) {
        errEl.innerHTML = ERROR_MSGS[errKey];
        errEl.classList.add("show");
      }

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.classList.remove("show");

        const password = document.getElementById("password").value;
        if (password.length < 8) {
          errEl.textContent = "Password must be at least 8 characters.";
          errEl.classList.add("show");
          return;
        }

        const btn = document.getElementById("btn");
        btn.disabled = true;
        btn.textContent = "Saving…";

        const fd = new FormData();
        fd.append("token", token);
        fd.append("password", password);
        const r = await fetch("/reset-password", {
          method: "POST",
          body: fd,
          redirect: "follow",
          credentials: "same-origin",
        });

        const finalUrl = new URL(r.url);
        if (finalUrl.pathname === "/login") {
          window.location.href = "/login?reset=1";
          return;
        }

        btn.disabled = false;
        btn.textContent = "Set new password";
        const errKey = finalUrl.searchParams.get("error");
        if (errKey && ERROR_MSGS[errKey]) {
          errEl.innerHTML = ERROR_MSGS[errKey];
        } else {
          errEl.textContent = "Something went wrong. Please try again.";
        }
        errEl.classList.add("show");
      });
    </script>
  </body>
</html>
