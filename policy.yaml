tenants:
  default:
    upstream_url: https://api.openai.com/v1/chat/completions
    upstream_api_key: ${OPENAI_API_KEY}
    input:
      pii:
        enabled: true
        action: redact
        types:
        - email
        - phone
        - ssn
        - credit_card
      prompt_injection:
        enabled: true
        action: block
      topic_filter:
        enabled: false
        action: block
        blocked_topics: []
    output:
      max_length: null
      toxicity:
        enabled: true
        provider: wordlist
      json_schema: null
    rate_limit:
      enabled: false
      requests_per_minute: 60
      requests_per_hour: 1000
    webhook:
      enabled: false
      url: ${WEBHOOK_URL}
      secret: ${WEBHOOK_SECRET}
      true:
      - input_blocked
      - output_blocked
      - rate_limited
