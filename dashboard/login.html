<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Guardrail Proxy — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --accent:  #6366f1;
      --red:     #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 360px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .logo span { color: var(--accent); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type=password] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type=password]:focus { border-color: var(--accent); }

    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo"><span>Guardrail</span> Proxy</div>
    <div class="subtitle">Dashboard sign in</div>

    <div class="error" id="err">Incorrect password. Please try again.</div>

    <form method="POST" action="/login" id="form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="Enter dashboard password" />
      <button type="submit">Sign In</button>
    </form>
  </div>

  <script>
    // Show error if redirected back after failed login
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('err').classList.add('show');
    }

    // If form POST returns 401, redirect with error param
    // (Handles the case where the server returns login.html with status 401)
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const r = await fetch('/login', { method: 'POST', body: fd, redirect: 'manual' });
      if (r.type === 'opaqueredirect' || r.status === 302 || r.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('err').classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
