<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Guardrail Proxy — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #6366f1;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --blue:     #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent); }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    button.refresh {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    button.refresh:hover { opacity: 0.85; }

    main { padding: 24px; max-width: 1300px; margin: 0 auto; }

    /* Stat cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }

    .card .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .card .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .value.green { color: var(--green); }
    .value.red   { color: var(--red); }

    /* Two-column layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Top reasons bar chart */
    .reason-list { padding: 16px 18px; }

    .reason-row {
      display: grid;
      grid-template-columns: 1fr 60px;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .reason-row:last-child { margin-bottom: 0; }

    .reason-label {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      position: relative;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 4px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--red);
      transition: width 0.4s ease;
    }

    .reason-count {
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    /* Activity feed */
    .feed { overflow: auto; max-height: 340px; }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 16px;
      text-align: left;
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.passed        { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge.input_blocked { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge.output_blocked{ background: rgba(245,158,11,0.15); color: var(--yellow); }

    .badge.api-openai    { background: rgba(99,102,241,0.15); color: var(--accent); }
    .badge.api-anthropic { background: rgba(59,130,246,0.15); color: var(--blue); }

    .msg-preview {
      font-size: 12px;
      color: var(--muted);
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reason-text {
      font-size: 12px;
      color: var(--red);
    }

    .ts { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .empty { text-align: center; padding: 40px; color: var(--muted); }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>Guardrail</span> Proxy Dashboard</h1>
  <div class="controls">
    <select id="tenant-filter">
      <option value="">All tenants</option>
      <option value="default">default</option>
      <option value="strict">strict</option>
      <option value="dev">dev</option>
      <option value="structured">structured</option>
      <option value="anthropic_strict">anthropic_strict</option>
    </select>
    <select id="api-filter">
      <option value="">All APIs</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
    </select>
    <button class="refresh" onclick="refresh()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="stats" id="stats-row">
    <div class="card"><div class="label">Total Requests</div><div class="value" id="s-total">—</div></div>
    <div class="card"><div class="label">Blocked</div><div class="value red" id="s-blocked">—</div></div>
    <div class="card"><div class="label">Pass Rate</div><div class="value green" id="s-pass">—</div></div>
    <div class="card"><div class="label">Proxy Status</div><div class="value green" id="s-status"><span class="dot"></span>Online</div></div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-header">Top Block Reasons</div>
      <div class="reason-list" id="reasons-list">
        <div class="empty">No data yet</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">Recent Activity</div>
      <div class="feed">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Tenant</th>
              <th>API</th>
              <th>Outcome</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="feed-body">
            <tr><td colspan="5" class="empty">No events yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
  const API_BASE = window.location.origin;

  function tenant() { return document.getElementById('tenant-filter').value; }
  function api()    { return document.getElementById('api-filter').value; }

  function qs(params) {
    const p = Object.entries(params).filter(([,v]) => v).map(([k,v]) => `${k}=${encodeURIComponent(v)}`);
    return p.length ? '?' + p.join('&') : '';
  }

  async function refresh() {
    await Promise.all([loadStats(), loadFeed()]);
  }

  async function loadStats() {
    try {
      const r = await fetch(`${API_BASE}/stats${qs({ tenant_id: tenant() })}`);
      const d = await r.json();
      document.getElementById('s-total').textContent   = d.total_requests.toLocaleString();
      document.getElementById('s-blocked').textContent = d.blocked_requests.toLocaleString();
      document.getElementById('s-pass').textContent    = d.pass_rate + '%';
      renderReasons(d.top_block_reasons);
    } catch (e) {
      document.getElementById('s-status').innerHTML = '<span style="color:var(--red)">Offline</span>';
    }
  }

  function renderReasons(reasons) {
    const el = document.getElementById('reasons-list');
    if (!reasons || !reasons.length) {
      el.innerHTML = '<div class="empty">No blocks recorded</div>';
      return;
    }
    const max = reasons[0].count;
    el.innerHTML = reasons.map(r => `
      <div class="reason-row">
        <div>
          <div class="reason-label">${escape(r.reason || 'unknown')}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(r.count/max*100)}%"></div></div>
        </div>
        <div class="reason-count">${r.count}</div>
      </div>
    `).join('');
  }

  async function loadFeed() {
    try {
      const r = await fetch(`${API_BASE}/audit${qs({ limit: 50, tenant_id: tenant(), api: api() })}`);
      const rows = await r.json();
      const tbody = document.getElementById('feed-body');

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No events yet — send some requests through the proxy</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const t = new Date(row.timestamp * 1000).toLocaleTimeString();
        const preview = extractPreview(row.messages);
        return `
          <tr>
            <td class="ts">${t}</td>
            <td>${escape(row.tenant_id)}</td>
            <td><span class="badge api-${row.api}">${row.api}</span></td>
            <td><span class="badge ${row.outcome}">${row.outcome.replace('_', ' ')}</span></td>
            <td>
              ${row.reason ? `<div class="reason-text">${escape(row.reason)}</div>` : ''}
              <div class="msg-preview">${escape(preview)}</div>
            </td>
          </tr>
        `;
      }).join('');
    } catch (e) {
      console.error('Feed load failed:', e);
    }
  }

  function extractPreview(messages) {
    if (!messages || !messages.length) return '—';
    const last = messages.filter(m => m.role === 'user').pop();
    if (!last) return '—';
    const c = last.content;
    if (typeof c === 'string') return c.slice(0, 120);
    if (Array.isArray(c)) {
      const text = c.find(b => b.type === 'text');
      return text ? text.text.slice(0, 120) : '(non-text content)';
    }
    return '—';
  }

  function escape(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Auto-refresh every 10 seconds
  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
