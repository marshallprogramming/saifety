<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sAIfety — Forgot Password</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --muted: #64748b;
        --accent: #6366f1;
        --green: #22c55e;
        --red: #ef4444;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 40px 36px;
        width: 360px;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 6px;
      }
      .logo span {
        color: var(--accent);
      }
      .subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 28px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: var(--accent);
      }

      button {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
      }

      .alert.show {
        display: block;
      }
      .alert.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
      }
      .alert.success {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: var(--green);
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }
      .footer {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      }
      .footer a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="logo">s<span>AI</span>fety</div>
      <div class="subtitle">Reset your password</div>

      <div class="alert error" id="err">
        Please enter a valid email address.
      </div>
      <div class="alert success" id="ok">
        If that email is registered, a reset link is on its way. Check your
        inbox.
      </div>

      <form id="form" novalidate>
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@company.com"
          autofocus
          autocomplete="email"
        />
        <button type="submit" id="btn">Send reset link</button>
      </form>

      <hr />
      <div class="footer"><a href="/login">Back to sign in</a></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);

      if (params.get("sent") === "1") {
        document.getElementById("form").style.display = "none";
        document.getElementById("ok").classList.add("show");
      }

      if (params.get("error") === "invalid") {
        document.getElementById("err").classList.add("show");
      }

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        if (!email || !email.includes("@")) {
          document.getElementById("err").classList.add("show");
          return;
        }
        document.getElementById("err").classList.remove("show");
        const btn = document.getElementById("btn");
        btn.disabled = true;
        btn.textContent = "Sending…";

        const fd = new FormData();
        fd.append("email", email);
        const r = await fetch("/forgot-password", {
          method: "POST",
          body: fd,
          redirect: "manual",
        });
        // Server always redirects to ?sent=1 regardless of whether email exists
        document.getElementById("form").style.display = "none";
        document.getElementById("ok").classList.add("show");
      });
    </script>
  </body>
</html>
