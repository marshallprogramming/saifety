<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>sAIfety — Sign In</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --muted: #64748b;
        --accent: #6366f1;
        --red: #ef4444;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 40px 36px;
        width: 360px;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 6px;
      }

      .logo span {
        color: var(--accent);
      }

      .subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 32px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      input[type="password"],
      input[type="email"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="password"]:focus,
      input[type="email"]:focus {
        border-color: var(--accent);
      }

      button {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.85;
      }

      .error {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
      }

      .error.show {
        display: block;
      }

      .success {
        display: none;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #22c55e;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
      }

      .success.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="logo">s<span>AI</span>fety</div>
      <div class="subtitle">Dashboard sign in</div>

      <div class="success" id="ok">
        Password updated successfully. Sign in with your new password.
      </div>
      <div class="error" id="err">
        Incorrect email or password. Please try again.
      </div>

      <form method="POST" action="/login" id="form">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          autocomplete="email"
        />

        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
          "
        >
          <label for="password" style="margin-bottom: 0">Password</label>
          <a
            href="/forgot-password"
            style="font-size: 12px; color: var(--accent); text-decoration: none"
            >Forgot password?</a
          >
        </div>
        <input
          type="password"
          id="password"
          name="password"
          autofocus
          placeholder="Password"
          autocomplete="current-password"
        />
        <button type="submit">Sign In</button>
      </form>

      <hr
        style="
          border: none;
          border-top: 1px solid var(--border);
          margin: 20px 0;
        "
      />
      <p style="text-align: center; font-size: 13px; color: var(--muted)">
        New here?
        <a href="/signup" style="color: var(--accent); text-decoration: none"
          >Create an account</a
        >
      </p>
    </div>

    <script>
      if (new URLSearchParams(window.location.search).get("reset") === "1") {
        document.getElementById("ok").classList.add("show");
      }

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = fd.get("email") || "";
        const r = await fetch("/login", {
          method: "POST",
          body: fd,
          redirect: "follow",
          credentials: "same-origin",
        });
        if (r.ok || r.redirected) {
          window.location.href = email.trim() ? "/account" : "/";
        } else {
          document.getElementById("err").classList.add("show");
          document.getElementById("password").value = "";
          document.getElementById("password").focus();
        }
      });
    </script>
  </body>
</html>
