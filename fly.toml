app = "saifety"
primary_region = "lhr"

[build]

[env]
  DATA_DIR = "/data"
  PORT     = "8000"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source      = "saifety_data"
  destination = "/data"

kill_signal  = "SIGTERM"
kill_timeout = 5
